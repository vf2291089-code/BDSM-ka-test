        const COOLDOWN_HOURS = 24;
        function checkCooldown() {
            const lastPlayed = parseInt(localStorage.getItem('bdsm_quest_last_played'), 10);
            if (!lastPlayed) return false;
            const diffHours = (Date.now() - lastPlayed) / (1000 * 60 * 60);
            if (diffHours < COOLDOWN_HOURS) {
                startCountdown(lastPlayed + (COOLDOWN_HOURS * 60 * 60 * 1000));
                return true;
            }
            return false;
        }

        function setCooldown() {
            localStorage.setItem('bdsm_quest_last_played', Date.now().toString());

        function startCountdown(targetTimeMs) {
            if(cooldownInterval) clearInterval(cooldownInterval);
            const timerEl = document.getElementById('countdown-timer');
            cooldownInterval = setInterval(() => {
                const diff = targetTimeMs - Date.now();
                if (diff <= 0) {
                    clearInterval(cooldownInterval);
                    localStorage.removeItem('bdsm_quest_last_played');
                    initApp();
                    return;
                }
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                timerEl.textContent = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            }, 1000);
        }
