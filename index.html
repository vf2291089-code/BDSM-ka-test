            background: radial-gradient(circle, rgba(var(--color-accent), 0.08) 0%, transparent 60%);

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        ::-webkit-scrollbar { width: 4px; }

        function spawnParticles(e, forceColorStr = null) {
            const x = e ? e.clientX : window.innerWidth / 2;
            const y = e ? e.clientY : window.innerHeight / 2;
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');

                const colorStr = forceColorStr || `rgb(${getComputedStyle(document.body).getPropertyValue('--color-accent')})`;

                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 80 + 30;
                p.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${Math.cos(angle) * velocity}px), calc(-50% + ${Math.sin(angle) * velocity}px)) scale(0)`, opacity: 0 }
                ], { duration: Math.random() * 500 + 400, easing: 'cubic-bezier(0.25, 1, 0.5, 1)' }).onfinish = () => p.remove();

                q17_1: { text: "17.1 А если во время жесткой сессии я запаникую и использую «стоп-слово»?", options: [ { text: "Моментально остановлюсь, сниму фиксацию и переключусь на заботу.", nextId: "q18", scores: { daddy: +3 } }, { text: "Сначала снижу темп и спрошу, точно ли нужно. Иногда девочки просто капризничают.", nextId: "q18", scores: { strict: +2 } } ] },

                q18_1: { text: "18.1 Понимаешь ли ты, что эстетика требует месяцев подготовки (Шибари и тд)?", options: [ { text: "Конечно. Готов вкладывать время и деньги в обучение.", nextId: "q19", scores: { teacher: +2 } }, { text: "Главное — желание, а технические детали приложатся сами.", nextId: "q19", scores: {} } ] },
                q19: { text: "19. Игры с огнем (Bratting). Что, если я начну дерзить и проверять твои нервы?", options: [ { text: "Обожаю. Укрощение строптивой и подавление бунта заводит меня больше всего.", nextId: "q19_1", scores: { brat_tamer: +4 } }, { text: "Могу поддержать игру ради разнообразия, если это просто ролевой флирт.", nextId: "q20", scores: { brat_tamer: +1 } }, { text: "Не потерплю. Мне нужно искреннее послушание. Дерзость — это неуважение.", nextId: "q19_2", scores: { strict: +3 } } ] },
                q19_1: { text: "19.1 Как ты будешь ставить меня на место, когда дерзость перейдет черту?", options: [ { text: "Жестким физическим наказанием. Хорошая порка сбивает спесь.", nextId: "q20", scores: { sadism: +2, brat_tamer: +2 } }, { text: "Психологическим давлением. Буду загонять в угол морально, пока сама не сломаешься.", nextId: "q20", scores: { mindfuck: +3, brat_tamer: +2 } } ] },
                q19_2: { text: "19.2 То есть ты ждешь абсолютной покорности с первой секунды?", options: [ { text: "Да. Ты либо признаешь мой авторитет сразу, либо нам не по пути.", nextId: "q20", scores: { strict: +4, control: +2 } }, { text: "Нет, понимаю, что доверие нужно заслужить, но не играю в детские провокации.", nextId: "q20", scores: { teacher: +2 } } ] },
                q20: { text: "20. Твои стоп-сигналы. Что заставит тебя навсегда разочароваться во мне?", options: [ { text: "Ложь, скрытность и нарушение базовых договоренностей. Власть строится на честности.", nextId: "q20_1", scores: { control: +2, teacher: +1 } }, { text: "Попытка перехватить контроль. Если начнешь мной манипулировать — игра окончена.", nextId: "q20_2", scores: { strict: +3, primal: +1 } }, { text: "Эмоциональная холодность ('синдром бревна'). Я питаюсь твоей отдачей.", nextId: "end", scores: { sadism: +2 } } ] },
                q20_1: { text: "20.1 А если я нарушила правило из страха, но потом сама призналась? Дашь шанс?", options: [ { text: "Ценю честность. Получишь жесткое наказание, но отношения продолжатся.", nextId: "end", scores: { teacher: +3, daddy: +1 } }, { text: "Предательство есть предательство. Мне будет сложно вернуть прежнее отношение.", nextId: "end", scores: { strict: +3 } } ] },
                q20_2: { text: "20.2 А могу ли я предлагать новые практики или делиться фантазиями?", options: [ { text: "Конечно, выслушаю, но финальное решение и сценарий всегда за мной.", nextId: "end", scores: { daddy: +2, teacher: +2 } }, { text: "Я сам знаю, что тебе нужно. Твоя задача — принимать то, что я даю.", nextId: "end", scores: { strict: +4, control: +3 } } ] }
            }
        };

        // --- СОСТОЯНИЕ И ЛОГИКА ---
        let currentRole = null;
        let userAnswers = [];
        let currentScores = {};
        let radarChartInstance = null;
        let finalTitle = ""; 

        function showScreen(screenId) {
            ['screen-welcome', 'screen-quiz', 'screen-result'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
                document.getElementById(id).classList.remove('fade-in');
            });
            const screen = document.getElementById(screenId);
            screen.classList.remove('hidden');
            void screen.offsetWidth;
            screen.classList.add('fade-in');
        }

        function startQuiz(role, event) {
            if(event) spawnParticles(event, role === 'submissive' ? '#00bfff' : '#ff7800');
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

            currentRole = role;
            userAnswers = [];
            currentScores = {};
            document.body.className = `min-h-screen flex flex-col items-center justify-start p-4 transition-colors duration-700 theme-${role}`;
            document.getElementById('role-indicator').textContent = role === 'submissive' ? 'Путь Нижнего' : 'Путь Верхнего';
            
            setTimeout(() => { showScreen('screen-quiz'); renderQuestion('q1'); }, 300);
        }

        function renderQuestion(questionId) {
            if (questionId === 'end') { calculateAndShowResult(); return; }

            const qData = questData[currentRole][questionId];
            if (!qData) { console.error("Question missing:", questionId); calculateAndShowResult(); return; }

            const container = document.getElementById('question-container');
            container.classList.remove('fade-in'); void container.offsetWidth; container.classList.add('fade-in');

            document.getElementById('question-text').textContent = qData.text;
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            qData.options.forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = 'w-full bg-dark/50 border border-gray-800 hover:border-accent hover:bg-accent/10 transition-all duration-300 p-4 rounded-xl text-left text-sm text-gray-300 hover:text-white leading-snug hover:shadow-glow relative overflow-hidden';
                btn.textContent = opt.text;
                btn.onclick = (e) => handleAnswer(questionId, opt, e);
                optionsContainer.appendChild(btn);
            });
        }

        function handleAnswer(questionId, opt, event) {
            userAnswers.push({ qId: questionId, answer: opt.text });
            
            if (opt.scores) {
                for (const [trait, value] of Object.entries(opt.scores)) {
                    currentScores[trait] = (currentScores[trait] || 0) + value;
                }
            }

            if(event) spawnParticles(event);
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            setTimeout(() => { renderQuestion(opt.nextId); }, 250);
        }

        function calculateAndShowResult() {
            let bestTitle = titlesData[currentRole][0];
            let maxScore = -1;

            titlesData[currentRole].forEach(titleObj => {
                let currentTitleScore = 0;
                titleObj.traits.forEach(trait => {
                    currentTitleScore += (currentScores[trait] || 0);
                });
                if (currentTitleScore > maxScore) {
                    maxScore = currentTitleScore;
                    bestTitle = titleObj;
                }
            });

            finalTitle = bestTitle.title; 

            document.getElementById('result-title').textContent = bestTitle.title;
            document.getElementById('result-desc').textContent = bestTitle.desc;
            
            showScreen('screen-result');
            drawRadarChart();
        }

        function drawRadarChart() {
            let sortedTraits = Object.keys(currentScores).sort((a,b) => currentScores[b] - currentScores[a]).slice(0, 6);
            
            const defaults = currentRole === 'submissive' 
                ? ['submission', 'masochism', 'service', 'chastity', 'mindfuck', 'degradation'] 
                : ['control', 'sadism', 'strict', 'teacher', 'bondage', 'primal'];
            
            if(sortedTraits.length < 3) {
                defaults.forEach(d => { if(!sortedTraits.includes(d)) sortedTraits.push(d); });
                sortedTraits = sortedTraits.slice(0, 6);
            }

            const labels = sortedTraits.map(t => traitLabels[t] || t);
            const data = sortedTraits.map(t => (currentScores[t] || 0) + 1);

            const ctx = document.getElementById('radarChart').getContext('2d');
            if(radarChartInstance) radarChartInstance.destroy();
            
            const rgbColor = getComputedStyle(document.body).getPropertyValue('--color-accent').trim();

            radarChartInstance = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Интенсивность',
                        data: data,
                        backgroundColor: `rgba(${rgbColor}, 0.25)`,
                        borderColor: `rgba(${rgbColor}, 1)`,
                        pointBackgroundColor: `rgba(${rgbColor}, 1)`,
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: `rgba(${rgbColor}, 1)`,
                        borderWidth: 2,
                    }]
                },
                options: {
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255, 255, 255, 0.1)' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' },
                            pointLabels: { 
                                color: 'rgba(255, 255, 255, 0.8)', 
                                font: { size: 10, family: "sans-serif" } 
                            },
                            ticks: { display: false, min: 0 } 
                        }
                    },
                    plugins: { legend: { display: false } },
                    maintainAspectRatio: false
                }
            });
        }

        function downloadResult() {
            const captureArea = document.getElementById('capture-area');
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

            html2canvas(captureArea, {
                backgroundColor: '#111111', 
                scale: 2,
                logging: false,
                useCORS: true
            }).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = `Квест_Инициация_${Date.now()}.png`;
                link.href = imgData;
                link.click();
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            }).catch(err => {
                console.error("Ошибка генерации:", err);
                alert("Не удалось сохранить картинку. Сделай скриншот экрана!");
            });
        }

        // --- ВАШ WEBHOOK URL ОТ GOOGLE APPS SCRIPT ---
        const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbxdJtjTKeIJnlGbs_BF7m19j04iUyoa01cEJkrVlmLVnoF1aNs6s36dHh2EZ4Sz59FYeQ/exec';

        async function finishQuiz() {
            const btn = document.getElementById('finish-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Отправка данных... ⏳';
            btn.disabled = true;

            const tgUser = tg.initDataUnsafe?.user || {};

            const payload = {
                tgId: tgUser.id || 'Аноним',
                tgUsername: tgUser.username ? '@' + tgUser.username : (tgUser.first_name || 'Без имени'),
                role: currentRole === 'submissive' ? 'Нижний' : 'Верхний',
                title: finalTitle,
                answers: JSON.stringify(userAnswers)
            };

            try {
                // Мы убрали заголовок 'application/json', чтобы обойти блокировку CORS
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                alert("Анкета успешно отправлена Госпоже!");
            } catch(e) {
                console.error('Ошибка отправки:', e);
                alert("Анкета отправлена!");
            }

            btn.innerHTML = originalText;
            btn.disabled = false;

            // Возвращаемся на стартовый экран (БЕЗ ТАЙМЕРА)
            currentRole = null; 
            userAnswers = []; 
            currentScores = {};
            document.body.className = 'min-h-screen flex flex-col items-center justify-start p-4 transition-colors duration-700';
            showScreen('screen-welcome');
        }

        function resetApp(event) {
            if(confirm('Точно прервать инициацию?')) {
                if(event) spawnParticles(event, '#ffffff');
                currentRole = null; userAnswers = []; currentScores = {};
                document.body.className = 'min-h-screen flex flex-col items-center justify-start p-4 transition-colors duration-700';
                showScreen('screen-welcome');
            }
        }

        function initApp() {
            document.body.className = 'min-h-screen flex flex-col items-center justify-start p-4 transition-colors duration-700';
            showScreen('screen-welcome');
        }

        window.onload = initApp;
    </script>
</body>
