        :root { --color-accent: 139, 0, 0; }
        body.theme-submissive { --color-accent: 0, 191, 255; }

        body {
            background-color: #050505;
            color: #e5e5e5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.5s ease;
            overflow-x: hidden;
        }

        .ambient-glow {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw; height: 100vw;
            background: radial-gradient(circle, rgba(var(--color-accent), 0.08) 0%, transparent 60%);
            z-index: -1;
            pointer-events: none;
            transition: background 0.8s ease;
        }

        .fade-in { animation: fadeIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(var(--color-accent), 0.8); border-radius: 4px; }

        /* Анимации жидкости для шкалы прогресса */
        @keyframes slosh {
            0% { background-position: 100% 0; }
            100% { background-position: -100% 0; }
        }
        .liquid-bar {
            height: 12px;
            border-radius: 6px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        body.theme-submissive .liquid-bar {
            background: linear-gradient(90deg, #004466, #00bfff, #ffffff, #00bfff, #004466);
            background-size: 200% 100%;
            animation: slosh 2s infinite linear;
            box-shadow: 0 0 10px rgba(0,191,255,0.6);
        }
        body.theme-dominant .liquid-bar {
            background: linear-gradient(90deg, #660000, #ff4500, #ffaa00, #ff4500, #660000);
            background-size: 200% 100%;
            animation: slosh 1s infinite linear;
            box-shadow: 0 0 10px rgba(255,69,0,0.6);
        }

        // --- Эффекты частиц ---
        function spawnParticles(e, forceColorStr = null) {
            const x = e ? e.clientX : window.innerWidth / 2;
            const y = e ? e.clientY : window.innerHeight / 2;
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                document.body.appendChild(p);
                const size = Math.random() * 4 + 2;
                const colorStr = forceColorStr || `rgb(${getComputedStyle(document.body).getPropertyValue('--color-accent')})`;

                const velocity = Math.random() * 80 + 30;
                p.animate([

                        { text: "Мы делим расходы на аренду и отели пополам. Удовольствие получают оба, это справедливо.", nextId: "q14", scores: { } },
                        { text: "Финансовое подчинение (Findom). Она обязана оплачивать мне студии, дарить девайсы и переводить дань за сессии.", nextId: "q14", scores: { mind_control: +6, degradation: +4 } },
                        { text: "Если она хочет, чтобы я её красиво порол, пусть сама арендует VIP-студию. Мое время и навыки стоят дороже.", nextId: "q14", scores: { strict: +4 } }
                    ] 
                },
                q14: { 
                    text: "14. Безопасность и стоп-слова. Если в разгар жесткой сессии она в панике кричит «Стоп!»?", 
                    options: [ 
                        { text: "Мгновенно останавливаюсь, отбрасываю плеть, снимаю фиксацию и переключаюсь на мягкую заботу и успокоение.", nextId: "q15", scores: { daddy: +8, teacher: +4 } }, 
                        { text: "Снижу темп до минимума и строгим тоном спрошу, что не так. Иногда сабы пугаются своих же фантазий.", nextId: "q15", scores: { strict: +6, teacher: +5 } },
                        { text: "Практикую CNC (игнорирование стоп-слова). Я заранее предупреждаю: если мы начали, я закончу только тогда, когда решу сам.", nextId: "q15", scores: { edgeplay: +8, mind_control: +8, sadism: +6 } },
                        { text: "Остановлю сессию, но буду зол. Если она прервала процесс без веской причины, она будет наказана за слабость.", nextId: "q15", scores: { strict: +8, sadism: +4 } }
                    ] 
                },
                q15: { 
                    text: "15. Твои 'Красные флаги'. Что заставит тебя навсегда выгнать нижнюю?", 
                    options: [ 
                        { text: "Ложь и скрытность. Моя власть строится на 100% доверии. Соврала один раз — прощай навсегда.", nextId: "end", scores: { control: +8, strict: +8 } }, 
                        { text: "Попытка манипулировать мной (bottoming from the bottom). Если она начнет указывать, как мне доминировать.", nextId: "end", scores: { strict: +10, primal: +4 } },
                        { text: "Эмоциональное 'бревно'. Если она не кричит, не извивается и не дает мне энергетической отдачи от боли.", nextId: "end", scores: { sadism: +8, primal: +6 } },
                        { text: "Отказ выполнять грязные или унизительные приказы. Я не потерплю брезгливости в служении.", nextId: "end", scores: { degradation: +8, mind_control: +5 } }
                    ] 
                }
            }
        };

        let currentRole = null;
        let userAnswers = [];
        let currentScores = {};
        let radarChartInstance = null;
        let finalTitle = ""; 

        function showScreen(screenId) {
            ['screen-welcome', 'screen-quiz', 'screen-result'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
                document.getElementById(id).classList.remove('fade-in');
            });
            const screen = document.getElementById(screenId);
            screen.classList.remove('hidden');
            void screen.offsetWidth;
            screen.classList.add('fade-in');
        }

        function startQuiz(role, event) {
            if(event) spawnParticles(event, role === 'submissive' ? '#00bfff' : '#ff7800');
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

            currentRole = role;
            userAnswers = [];
            currentScores = {};
            document.body.className = `min-h-screen flex flex-col items-center justify-start p-4 transition-colors duration-700 theme-${role}`;
            document.getElementById('role-indicator').textContent = role === 'submissive' ? 'Путь Нижнего' : 'Путь Верхнего';
            
            document.getElementById('progress-bar-fill').style.width = '0%';
            
            setTimeout(() => { 
                showScreen('screen-quiz'); 
                renderQuestion('q1'); 
                startLiquidParticles();
            }, 300);
        }

        function updateProgress(qId) {
            const maxQ = currentRole === 'submissive' ? 20 : 15; // Adjusted max steps based on average deepest path
            const match = qId.match(/\d+/);
            if(match) {
                const currentQ = parseInt(match[0]);
                const pct = Math.min(100, (currentQ / maxQ) * 100);
                document.getElementById('progress-bar-fill').style.width = pct + '%';
            }
        }

        function renderQuestion(questionId) {
            if (questionId === 'end') { calculateAndShowResult(); return; }

            const qData = questData[currentRole][questionId];
            if (!qData) { calculateAndShowResult(); return; }

            updateProgress(questionId);

            const container = document.getElementById('question-container');
            container.classList.remove('fade-in'); void container.offsetWidth; container.classList.add('fade-in');

            document.getElementById('question-text').textContent = qData.text;
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            qData.options.forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = 'w-full bg-dark/50 border border-gray-800 hover:border-accent hover:bg-accent/10 transition-all duration-300 p-4 rounded-xl text-left text-sm text-gray-300 hover:text-white leading-snug hover:shadow-glow relative overflow-hidden';
                btn.textContent = opt.text;
                btn.onclick = (e) => handleAnswer(questionId, opt, e);
                optionsContainer.appendChild(btn);
            });
        }

        function handleAnswer(questionId, opt, event) {
            userAnswers.push({ qId: questionId, answer: opt.text });
            
            if (opt.scores) {
                for (const [trait, value] of Object.entries(opt.scores)) {
                    currentScores[trait] = (currentScores[trait] || 0) + value;
                }
            }

            if(event) spawnParticles(event);
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            setTimeout(() => { renderQuestion(opt.nextId); }, 250);
        }

        function calculateAndShowResult() {
            stopLiquidParticles();
            let bestTitle = titlesData[currentRole][0];
            let maxTitleScore = -1;

            titlesData[currentRole].forEach(titleObj => {
                let currentTitleScore = 0;
                titleObj.traits.forEach(trait => {
                    currentTitleScore += (currentScores[trait] || 0);
                });
                if (currentTitleScore > maxTitleScore) {
                    maxTitleScore = currentTitleScore;
                    bestTitle = titleObj;
                }
            });

            finalTitle = bestTitle.title; 
            document.getElementById('result-title').textContent = bestTitle.title;
            document.getElementById('result-desc').textContent = bestTitle.desc;

            const axes = radarAxes[currentRole];
            let maxAxis = axes[0];
            let maxAxisScore = -1;
            axes.forEach(axis => {
                const score = currentScores[axis] || 0;
                if (score > maxAxisScore) {
                    maxAxisScore = score;
                    maxAxis = axis;
                }
            });
            document.getElementById('dominant-trait-text').textContent = traitLabels[maxAxis];
            
            showScreen('screen-result');
            drawRadarChart();
        }

        function drawRadarChart() {
            const axes = radarAxes[currentRole];
            const labels = axes.map(t => traitLabels[t] || t);
            const data = axes.map(t => (currentScores[t] || 0) + 1);

            const ctx = document.getElementById('radarChart').getContext('2d');
            if(radarChartInstance) radarChartInstance.destroy();
            
            const rgbColor = getComputedStyle(document.body).getPropertyValue('--color-accent').trim();

            radarChartInstance = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Интенсивность',
                        data: data,
                        backgroundColor: `rgba(${rgbColor}, 0.3)`,
                        borderColor: `rgba(${rgbColor}, 1)`,
                        pointBackgroundColor: `rgba(${rgbColor}, 1)`,
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: `rgba(${rgbColor}, 1)`,
                        borderWidth: 2,
                    }]
                },
                options: {
                    scales: {
                        r: {
                            beginAtZero: true, 
                            angleLines: { color: 'rgba(255, 255, 255, 0.1)' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' },
                            pointLabels: { 
                                color: 'rgba(255, 255, 255, 0.9)', 
                                font: { size: 10, family: "sans-serif", weight: 'bold' } 
                            },
                            ticks: { display: false } 
                        }
                    },
                    plugins: { legend: { display: false } },
                    maintainAspectRatio: false
                }
            });
        }

        // --- МОБИЛЬНОЕ СКАЧИВАНИЕ / ПОДЕЛИТЬСЯ ---
        async function downloadResult() {
            const btn = document.getElementById('btn-download');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Генерация... ⏳';
            btn.disabled = true;
            const captureArea = document.getElementById('capture-area');
            
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

            try {
                const canvas = await html2canvas(captureArea, {
                    backgroundColor: '#111111', 
                    scale: 2,
                    logging: false,
                    useCORS: true
                });

                const imgData = canvas.toDataURL('image/jpeg', 0.9);
                
                // Пробуем нативное окно "Поделиться/Сохранить" (работает на большинстве современных телефонов)
                if (navigator.share && navigator.canShare) {
                    try {
                        const blob = await (await fetch(imgData)).blob();
                        const file = new File([blob], `BDSM_Quest_${Date.now()}.jpg`, { type: 'image/jpeg' });
                        if (navigator.canShare({ files: [file] })) {
                            await navigator.share({
                                files: [file],
                                title: 'Мой результат инициации',
                            });
                            btn.innerHTML = originalText;
                            btn.disabled = false;
                            return; // Успешно поделились/сохранили
                        }
                    } catch (shareError) {
                        console.log('Share API error or cancelled', shareError);
                    }
                }

                // Резервный метод скачивания (если Share API не сработал или заблокирован)
                const link = document.createElement('a');
                link.style.display = 'none';
                link.download = `Квест_Инициация_${Date.now()}.jpg`;
                link.href = imgData;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');

            } catch (err) {
                console.error("Ошибка генерации:", err);
                alert("Не удалось создать картинку. Пожалуйста, сделайте скриншот экрана!");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbxdJtjTKeIJnlGbs_BF7m19j04iUyoa01cEJkrVlmLVnoF1aNs6s36dHh2EZ4Sz59FYeQ/exec';

        async function finishQuiz() {
            const btn = document.getElementById('finish-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Отправка данных... ⏳';
            btn.disabled = true;

            const tgUser = tg.initDataUnsafe?.user || {};

            const payload = {
                tgId: tgUser.id || 'Аноним',
                tgUsername: tgUser.username ? '@' + tgUser.username : (tgUser.first_name || 'Без имени'),
                role: currentRole === 'submissive' ? 'Нижний' : 'Верхний',
                title: finalTitle,
                answers: JSON.stringify(userAnswers)
            };

            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                alert("Анкета успешно отправлена Госпоже!");
            } catch(e) {
                console.error('Ошибка отправки:', e);
                // Даже если вылезет ошибка сети из-за CORS, запрос обычно доходит
                alert("Анкета отправлена!"); 
            }

            btn.innerHTML = originalText;
            btn.disabled = false;

            resetApp();
        }

        function resetApp(event) {
            if(event) {
                if(!confirm('Точно прервать инициацию?')) return;
                spawnParticles(event, '#ffffff');
            }
            stopLiquidParticles();
            currentRole = null; userAnswers = []; currentScores = {};
            document.body.className = 'min-h-screen flex flex-col items-center justify-start p-4 transition-colors duration-700';
            showScreen('screen-welcome');
        }

        function initApp() {
            document.body.className = 'min-h-screen flex flex-col items-center justify-start p-4 transition-colors duration-700';
            showScreen('screen-welcome');
        }

        window.onload = initApp;
    </script>
